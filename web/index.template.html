<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1420">
<title>室內配線(五股)甄試 · 刷題</title>
<style>
:root{
 --bg:#0f1420; --card:#182031; --card2:#1e2740; --line:#2b3752;
 --tx:#e8edf7; --dim:#8b98b4; --brand:#4f8cff; --brand2:#7aa7ff;
 --ok:#2ec77a; --okbg:#123524; --bad:#ff6b6b; --badbg:#3a1720; --warn:#ffb84d; --hot:#ff8a3d;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--tx);
 font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);line-height:1.55}
.wrap{max-width:680px;margin:0 auto;padding:16px 16px 48px}
h1{font-size:20px;margin:6px 0 2px}
.sub{color:var(--dim);font-size:13px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.row{display:flex;gap:10px}.row>*{flex:1}
.stat{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
.stat .n{font-size:26px;font-weight:800;line-height:1.1}
.stat .l{font-size:12px;color:var(--dim);margin-top:3px}
.n.ok{color:var(--ok)}.n.bad{color:var(--bad)}.n.br{color:var(--brand2)}.n.hot{color:var(--hot)}
button{font-family:inherit;font-size:16px;cursor:pointer;border:none;border-radius:14px;
 padding:14px 16px;color:#fff;background:var(--brand);font-weight:700;width:100%;transition:.12s}
button:active{transform:scale(.98)}button:disabled{opacity:.4}
button.ghost{background:var(--card2);color:var(--tx);border:1px solid var(--line);font-weight:600}
button.sm{padding:9px 12px;font-size:14px;border-radius:11px;width:auto}
.btns{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat{background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:11px 12px;cursor:pointer;transition:.12s;position:relative}
.cat:active{transform:scale(.98)}
.cat .ct{font-size:14px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:6px}
.cat .num{color:var(--dim);font-size:12px;font-weight:500;white-space:nowrap}
.cat .wt{color:var(--brand2);font-size:11px;margin-top:3px}
.bar{height:6px;background:#0c1120;border-radius:6px;margin-top:7px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--ok));border-radius:6px;transition:.4s}
.sec-t{font-size:13px;color:var(--dim);margin:18px 2px 8px;font-weight:700;letter-spacing:.03em;display:flex;justify-content:space-between}
.fire{color:var(--hot)}
.hotitem{background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--hot);border-radius:10px;padding:9px 12px;margin-bottom:7px;font-size:13.5px}
.hotitem .loc{color:var(--dim);font-size:11.5px;margin-top:2px}
/* quiz / explain */
.qtop{display:flex;justify-content:space-between;align-items:center;color:var(--dim);font-size:13px;margin-bottom:10px}
.qtop span{cursor:pointer}
.pbar{height:7px;background:var(--card2);border-radius:7px;overflow:hidden;margin-bottom:14px}
.pbar>i{display:block;height:100%;background:var(--brand);transition:.3s}
.meta{color:var(--dim);font-size:12.5px;margin-bottom:6px}
.badge{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;
 padding:2px 10px;font-size:11.5px;color:var(--brand2)}
.badge.h{color:var(--hot);border-color:#5a3a24}
.q{font-size:19px;font-weight:600;margin:6px 0 16px;line-height:1.5}
.opt{display:flex;gap:11px;align-items:flex-start;background:var(--card2);border:1.5px solid var(--line);
 border-radius:13px;padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:.12s;font-size:16px}
.opt:active{transform:scale(.99)}
.opt .k{flex:0 0 26px;height:26px;border-radius:50%;background:#0c1120;border:1px solid var(--line);
 display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--dim)}
.opt.correct{border-color:var(--ok);background:var(--okbg)}.opt.correct .k{background:var(--ok);color:#062;border-color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:var(--badbg)}.opt.wrong .k{background:var(--bad);color:#511;border-color:var(--bad)}
.opt.dis{cursor:default}
.opt .body{flex:1}
.opt .rz{font-size:13px;color:var(--dim);margin-top:5px;display:none;line-height:1.5}
.opt.showrz .rz{display:block}
.opt.correct .rz{color:#8fe6b3}.opt.wrong .rz{color:#f0a9a9}
.exp{background:var(--card2);border-left:3px solid var(--brand);border-radius:10px;padding:12px 14px;
 font-size:14.5px;color:#cdd6ea;margin:4px 0 14px;display:none}
.exp.show{display:block}
.mem{background:#2a2417;border-left:3px solid var(--warn);color:#f0d9a8;padding:11px 13px;border-radius:10px;font-size:14px;margin:4px 0 12px;line-height:1.55}
.fb{font-weight:800;font-size:16px;margin:2px 0 10px;display:none}
.fb.show{display:block}.fb.ok{color:var(--ok)}.fb.bad{color:var(--bad)}
.hide{display:none!important}
.link{color:var(--brand2);font-size:13px;text-align:center;margin-top:14px;cursor:pointer}
.tag{font-size:11px;color:var(--dim)}
.wlist{max-height:340px;overflow:auto}
.wq{background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px;font-size:14px}
.wq .qa{color:var(--ok);font-size:13px;margin-top:4px}
.big{font-size:44px;font-weight:800;text-align:center}
.center{text-align:center}
kbd{background:#0c1120;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px;color:var(--dim)}
/* listen */
.navbtns{display:flex;gap:10px;margin-top:6px}
.navbtns button{flex:1}
.lbtn{width:76px;height:76px;border-radius:50%;font-size:30px;margin:8px auto;display:grid;place-items:center}
.seg{transition:.15s;padding:4px 8px;border-radius:8px}.seg.cur{background:#25324e;color:#fff}
.ctrl{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:8px}
.pill{background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer}
.pill.on{background:var(--brand);color:#fff;border-color:var(--brand)}
select{background:var(--card2);color:var(--tx);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:14px;font-family:inherit}
.cin{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:#0c1120;color:var(--tx);font-size:16px;font-family:inherit}
.clabel{display:block;font-size:12px;color:var(--dim);margin:8px 0 4px}
.cout{margin-top:12px;padding:12px;border-radius:10px;background:#0c1120;border:1px dashed var(--line);font-size:16px;min-height:1.6em;color:var(--tx)}
.cbig{font-size:22px;color:var(--ok);font-weight:800}
.fcard{background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:10px}
.fname{font-size:13px;color:var(--brand2);font-weight:700;margin-bottom:6px}
.ff{font-family:ui-monospace,Menlo,monospace;font-size:16px;font-weight:700;color:#fff;background:#0c1120;border:1px solid var(--line);border-radius:8px;padding:9px 11px;overflow-x:auto;white-space:nowrap}
.fkid{font-size:14px;color:#dbe3f2;margin-top:8px;line-height:1.65}
.fex{font-size:13px;color:var(--warn);margin-top:6px}
.fuse{font-size:13px;color:#9fe6c0;margin-top:6px;line-height:1.55}
.fmn{font-size:13px;color:#e7c6ff;background:#241a33;border-radius:8px;padding:7px 10px;margin-top:7px;line-height:1.6}
.ftier{font-size:11px;padding:1px 7px;border-radius:20px;font-weight:700}
.ftier.t1{background:#3a1720;color:#ff9a9a}.ftier.t2{background:#2a2417;color:#ffcf7a}.ftier.t3{background:#123524;color:#7fe6a8}
.lp{padding:7px 10px;border-radius:8px;margin:2px 0;font-size:15px;line-height:1.8;color:#dbe3f2}
.lp.lph{font-weight:800;color:var(--brand2);margin-top:12px}
.lp.cur{background:#25324e;color:#fff}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const DATA = /*__DATA__*/null;
const QS = DATA.questions, CATS = DATA.cats, WEIGHTS = DATA.weights||{}, HOTC = DATA.hotConcepts||[];
const FORMULAS = DATA.formulas||[];
const LESSONS = DATA.lessons||[];
const QMAP = Object.fromEntries(QS.map(q=>[q.id,q]));
const KEY = "wiring5gu-v1";
const K = "①②③④", CN = "一二三四";

let ST = load();
function load(){ try{return JSON.parse(localStorage.getItem(KEY))||{s:{},day:{}}}catch(e){return {s:{},day:{}}} }
function save(){ localStorage.setItem(KEY, JSON.stringify(ST)) }
function rec(id){ return ST.s[id] || (ST.s[id]={box:0,seen:0,right:0,wrong:0,wrongEver:0}) }
function todayKey(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate() }
function grade(id, correct){
  const r=rec(id); r.seen++;
  if(correct){ r.right++; r.box=Math.min(5,(r.box||0)+1) }
  else { r.wrong++; r.wrongEver++; r.box=Math.max(1,(r.box||0)-2) }
  ST.day[todayKey()]=(ST.day[todayKey()]||0)+1; save();
}
function mastered(id){ return (ST.s[id]?.box||0)>=4 }
function isWrongBook(id){ const r=ST.s[id]; return r && r.wrongEver>0 && r.box<4 }
function masteredCount(){ return QS.filter(q=>mastered(q.id)).length }
function wrongBookList(){ return QS.filter(q=>isWrongBook(q.id)) }
function hotList(){ return QS.filter(q=>q.hot) }
function todayDone(){ return ST.day[todayKey()]||0 }
function orderSR(list){
  return list.map(q=>{
    const r=ST.s[q.id]; const box=r?r.box:0; const w=r?r.wrongEver:0;
    const score = box*10 - Math.min(w,3)*3 + (q.hot?-6:0) + Math.random()*4;
    return {q,score};
  }).sort((a,b)=>a.score-b.score).map(o=>o.q);
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) }
function pool5(){ return QS.filter(q=>(q.site||'五股')==='五股'); }          // 你要考的五股（主池）
function poolCat(c){ return pool5().filter(q=>q.cat===c); }
function poolExam(e){ return QS.filter(q=>q.exam===e); }
function siteList(){ return [...new Set(QS.filter(q=>(q.site||'五股')!=='五股').map(q=>q.site))]; }

let session=null;
const app=document.getElementById("app");

// ─────────── 首頁 ───────────
function home(){
  stopListen(); stopLesson(); session=null;
  const S5=pool5();
  const total=S5.length, mst=S5.filter(q=>mastered(q.id)).length, wb=wrongBookList().length, td=todayDone(), hot=S5.filter(q=>q.hot).length;
  const catStats=CATS.map(c=>{
    const qs=S5.filter(q=>q.cat===c); if(!qs.length) return null;
    const m=qs.filter(q=>mastered(q.id)).length; const w=WEIGHTS[c]||{};
    const hasHot=qs.some(q=>q.hot);
    return {c,total:qs.length,m,pct:Math.round(m/qs.length*100),avg:w.avg,hasHot};
  }).filter(Boolean).sort((a,b)=>b.total-a.total);
  app.innerHTML=`
  <h1>室內配線(五股) 甄試刷題</h1>
  <div class="sub">112 / 113 / 114 甄試考古題 · 主池 ${total} 題 · 間隔重複 · 逐選項詳解 · 語音朗讀</div>
  <div class="card">
   <div class="row">
    <div class="stat"><div class="n br">${total}</div><div class="l">題庫總數</div></div>
    <div class="stat"><div class="n ok">${mst}</div><div class="l">已精熟</div></div>
    <div class="stat"><div class="n bad">${wb}</div><div class="l">錯題待加強</div></div>
    <div class="stat"><div class="n hot">${hot}</div><div class="l">🔥高比重題</div></div>
   </div>
   <div class="bar" style="margin-top:14px"><i style="width:${Math.round(mst/total*100)}%"></i></div>
   <div class="tag" style="margin-top:6px">整體精熟度 ${Math.round(mst/total*100)}%　今日已練 ${td} 題</div>
  </div>
  <div class="btns">
   <button onclick="start('sr', pool5(), '全部練習')">▶ 開始練習（高比重與錯題優先）</button>
   <button class="ghost" onclick="startExplain(pool5(),'講解模式 · 全部')">📖 講解模式（看為何對 / 為何錯）</button>
   <button class="ghost" onclick="startListen(orderSR(pool5()),'聽力 · 全部')">🎧 聽力模式（用聽的，免動手）</button>
   <button class="ghost" onclick="formulaView()">📐 必背公式（小學生也懂）</button>
   ${LESSONS.length?`<button class="ghost" onclick="lessonsHome()">📖 觀念導讀 · 邊聽邊懂（多篇 · 可循環朗讀）</button>`:''}
   <button class="ghost" onclick="calcView()">🧮 計算機（電阻/電容/歐姆/壓降）</button>
   <div class="row">
     <button class="ghost" onclick="start('wrong', wrongBookList(), '錯題本')" ${wb?'':'disabled'}>🔁 只練錯題(${wb})</button>
     <button class="ghost" onclick="startExam()">📝 模擬考(40)</button>
   </div>
  </div>

  <div class="sec-t"><span class="fire">🔥 高比重考點（跨年度重複＝幾乎必考，先吃這些）</span></div>
  <div class="card" style="padding:12px">
   ${HOTC.map(h=>{const ex=[...new Set(h.ids.map(i=>i.slice(0,5)))].join('、');
     return `<div class="hotitem">${esc(h.name)}<div class="loc">出現於 ${ex}　·　${h.ids.length} 題</div></div>`}).join("")}
   <div class="btns" style="margin-top:8px">
    <button class="sm" style="width:100%" onclick="start('sr', hotList(), '高比重考點')">▶ 只練高比重考點（${hot} 題）</button>
    <button class="ghost sm" style="width:100%;margin-top:8px" onclick="startExplain(hotList(),'講解 · 高比重')">📖 看高比重詳解</button>
   </div>
  </div>

  <div class="sec-t"><span>依工作項目練習（每卷約幾題 = 比重）</span></div>
  <div class="grid">
   ${catStats.map(x=>`<div class="cat" onclick="start('sr', poolCat('${x.c}'), '${x.c}')">
     <div class="ct"><span>${x.hasHot?'🔥 ':''}${x.c}</span><span class="num">${x.m}/${x.total}</span></div>
     <div class="wt">每卷約 ${x.avg} 題</div>
     <div class="bar"><i style="width:${x.pct}%"></i></div></div>`).join("")}
  </div>

  <div class="sec-t"><span>依年度整卷（重心每年不同，三年都練）</span></div>
  <div class="grid">
   ${["112-1","113-1","114-1"].map(e=>{const qs=poolExam(e);const m=qs.filter(q=>mastered(q.id)).length;
     const theme={"112-1":"觀念/單位/變壓器","113-1":"接地/電動機/法規","114-1":"電容/三相/計算"}[e];
     return `<div class="cat" onclick="start('exam', poolExam('${e}'), '${e} 整卷')">
     <div class="ct"><span>${e} 整卷</span><span class="num">${m}/${qs.length}</span></div>
     <div class="wt">重心：${theme}</div>
     <div class="bar"><i style="width:${Math.round(m/qs.length*100)}%"></i></div></div>`}).join("")}
  </div>

  ${siteList().length?`<div class="sec-t"><span>🗺 其他場次補充（同分署室內配線 · 獨立練習，不併入上方五股統計）</span></div>
  ${siteList().map(site=>{
    const sq=QS.filter(q=>q.site===site);
    const exams=[...new Set(sq.map(q=>q.exam))];
    const m=sq.filter(q=>mastered(q.id)).length;
    return `<div class="card" style="padding:12px">
      <div style="font-weight:700;margin-bottom:8px">${site}場 · ${sq.length} 題 <span class="tag">已精熟 ${m}</span></div>
      <div class="grid">
        ${exams.map(e=>{const eq=poolExam(e);const em=eq.filter(q=>mastered(q.id)).length;
          return `<div class="cat" onclick="start('exam', poolExam('${e}'), '${e}')">
            <div class="ct"><span>${e}</span><span class="num">${em}/${eq.length}</span></div>
            <div class="bar"><i style="width:${Math.round(em/eq.length*100)}%"></i></div></div>`}).join("")}
      </div>
      <div class="navbtns" style="margin-top:8px">
        <button class="ghost sm" onclick="start('sr', QS.filter(q=>q.site==='${site}'), '${site}場練習')">▶ 練習</button>
        <button class="ghost sm" onclick="startExplain(QS.filter(q=>q.site==='${site}'),'講解 · ${site}')">📖 講解</button>
        <button class="ghost sm" onclick="startListen(orderSR(QS.filter(q=>q.site==='${site}')),'聽力 · ${site}')">🎧 聽</button>
      </div>
    </div>`;
  }).join("")}`:''}

  <div class="link" onclick="resetAll()">重置所有進度</div>`;
}

// ─────────── 必背公式頁 ───────────
function formulaView(){
  stopListen(); session=null;
  app.innerHTML=`
  <div class="qtop"><span onclick="home()">‹ 首頁</span><span>必背公式 · 小學生也懂</span><span></span></div>
  <div class="sub">🔴核心=考試會直接用到；🟡次要=偶爾一題或幫理解；🟢口訣=用背的不用算。點下方看每條的現實用處。</div>
  ${FORMULAS.map(g=>`
    <div class="sec-t"><span>${g.g}</span></div>
    ${g.items.map(it=>`<div class="fcard">
      <div class="fname">${esc(it.name)}${it.tier?` <span class="ftier ${it.tier==='核心'?'t1':it.tier==='口訣'?'t3':'t2'}">${it.tier}</span>`:''}</div>
      <div class="ff">${esc(it.f)}</div>
      <div class="fkid">🧒 ${esc(it.kid)}</div>
      ${it.mn?`<div class="fmn">🧠 口訣：${esc(it.mn)}</div>`:''}
      ${it.use?`<div class="fuse">💡 用處：${esc(it.use)}</div>`:''}
      ${it.ex?`<div class="fex">✏️ 例：${esc(it.ex)}</div>`:''}
    </div>`).join("")}
  `).join("")}
  <div class="btns" style="margin-top:14px"><button class="ghost" onclick="home()">回首頁</button></div>`;
}

// ─────────── 觀念導讀（可循環朗讀）───────────
let lsp={on:false, rate:0.95, loop:true, gen:0, idx:0};
function ttsLesson(s){ return ttsClean(String(s)).replace(/÷/g,'除以').replace(/×/g,'乘').replace(/=/g,'等於'); }
function stopLesson(){ if(window.speechSynthesis){ lsp.on=false; lsp.gen++; try{speechSynthesis.cancel()}catch(e){} } }
function lessonsHome(){
  stopListen(); stopLesson(); session=null;
  app.innerHTML=`
  <div class="qtop"><span onclick="home()">‹ 首頁</span><span>觀念導讀目錄</span><span></span></div>
  <h1>觀念導讀 · 邊聽邊懂</h1>
  <div class="sub">從實用情境出發，回推到原理，再對到題庫。每篇都能按 ▶ 循環朗讀。</div>
  ${LESSONS.map((L,i)=>`<div class="cat" style="margin-bottom:10px" onclick="lessonView(${i})">
    <div class="ct"><span>📖 ${esc(L.title)}</span><span class="num">▶ 聽</span></div>
    <div class="wt" style="color:var(--dim);white-space:normal;line-height:1.5">${esc(L.sub||'')}</div>
  </div>`).join("")}
  <div class="btns" style="margin-top:8px"><button class="ghost" onclick="home()">回首頁</button></div>`;
}
function lessonView(idx){
  stopListen(); session=null; lsp.idx=idx;
  const L=LESSONS[idx];
  app.innerHTML=`
  <div class="qtop"><span onclick="lessonsHome()">‹ 導讀目錄</span><span>${idx+1}/${LESSONS.length}</span><span onclick="home()">首頁</span></div>
  <h1>${esc(L.title)}</h1>
  <div class="sub">${esc(L.sub||'')}</div>
  <div class="card" style="position:sticky;top:6px;z-index:5;display:flex;gap:12px;align-items:center;padding:12px">
    <div class="lbtn" style="width:58px;height:58px;font-size:23px;margin:0;flex:0 0 auto;background:${lsp.on?'var(--warn)':'var(--brand)'}" onclick="toggleLesson()">${lsp.on?'⏸':'▶'}</div>
    <div style="flex:1">
      <div style="font-weight:700">${lsp.on?'朗讀中…':'按播放，一直唸給你聽'}</div>
      <div class="ctrl" style="margin-top:6px;justify-content:flex-start">
        <span class="pill ${lsp.loop?'on':''}" onclick="lsp.loop=!lsp.loop;lessonView(lsp.idx)">循環</span>
        <select onchange="lsp.rate=+this.value">${[0.8,0.9,1,1.1,1.25].map(r=>`<option value="${r}" ${r===lsp.rate?'selected':''}>${r}x</option>`).join("")}</select>
      </div>
    </div>
  </div>
  <div class="card">
    ${L.paras.map((p,i)=>p.h?`<div id="lp-${i}" class="lp lph">${esc(p.h)}</div>`:`<div id="lp-${i}" class="lp">${esc(p.t)}</div>`).join("")}
  </div>
  ${idx+1<LESSONS.length?`<button class="ghost" onclick="lessonView(${idx+1})">下一篇：${esc(LESSONS[idx+1].title)} ›</button>`:''}
  <div class="link" onclick="lessonsHome()">‹ 回導讀目錄</div>
  <div class="tag center">💡 鎖屏會中斷朗讀，聽的時候讓螢幕保持開著</div>`;
  hlLesson(null);

function hlLesson(id){ document.querySelectorAll('.lp').forEach(el=>el.classList.toggle('cur', el.id===id)); }
function toggleLesson(){
  if(lsp.on){ lsp.on=false; lsp.gen++; try{speechSynthesis.cancel()}catch(e){} lessonView(lsp.idx); }
  else { stopListen(); lsp.gen++; try{speechSynthesis.cancel()}catch(e){} lsp.on=true; lessonView(lsp.idx); playLesson(); }
}
function playLesson(){
  if(!lsp.on) return; const gen=lsp.gen; const paras=LESSONS[lsp.idx].paras;
  let k=0;
  (function go(){
    if(!lsp.on || gen!==lsp.gen) return;
    if(k>=paras.length){ if(lsp.loop){ k=0 } else { lsp.on=false; lessonView(lsp.idx); return } }
    const p=paras[k]; hlLesson('lp-'+k);
    const u=new SpeechSynthesisUtterance(ttsLesson(p.h||p.t)); u.lang='zh-TW'; u.rate=lsp.rate;
    const gap=p.h?380:280;
    u.onend=()=>{ if(gen!==lsp.gen) return; k++; setTimeout(go,gap); };
    u.onerror=()=>{ if(gen!==lsp.gen) return; k++; setTimeout(go,gap); };
    try{ speechSynthesis.speak(u); }catch(e){ if(gen===lsp.gen){ k++; setTimeout(go,gap); } }
  })();
}

function kNums(s){ return String(s).split(/[,，\s]+/).map(Number).filter(n=>!isNaN(n)&&n>0); }
function kR2(n){ return Math.round(n*100)/100; }
function calcR(mode){ const a=kNums(document.getElementById('cr').value), o=document.getElementById('crOut');
  if(!a.length){o.textContent='請先輸入電阻值';return;} const v=mode==='s'?a.reduce((s,x)=>s+x,0):1/a.reduce((s,x)=>s+1/x,0);
  o.innerHTML=`${mode==='s'?'串聯':'並聯'}總電阻 = <span class="cbig">${kR2(v)} Ω</span>`; }
function calcC(mode){ const a=kNums(document.getElementById('cc').value), o=document.getElementById('ccOut');
  if(!a.length){o.textContent='請先輸入電容值';return;} const v=mode==='s'?1/a.reduce((s,x)=>s+1/x,0):a.reduce((s,x)=>s+x,0);
  o.innerHTML=`${mode==='s'?'串聯':'並聯'}總電容 = <span class="cbig">${kR2(v)} μF</span>`; }
function calcOhm(){ let V=parseFloat(document.getElementById('cohmV').value),I=parseFloat(document.getElementById('cohmI').value),R=parseFloat(document.getElementById('cohmR').value);
  const o=document.getElementById('cohmOut'), has=[!isNaN(V),!isNaN(I),!isNaN(R)].filter(Boolean).length;
  if(has<2){o.textContent='請至少填兩格';return;}
  if(isNaN(V))V=I*R; else if(isNaN(I))I=V/R; else if(isNaN(R))R=V/I; const P=V*I;
  o.innerHTML=`V=${kR2(V)} V　I=${kR2(I)} A　R=${kR2(R)} Ω<br>功率 P = <span class="cbig">${kR2(P)} W</span>`; }
function calcVd(){ const I=parseFloat(document.getElementById('cvdI').value),L=parseFloat(document.getElementById('cvdL').value),A=parseFloat(document.getElementById('cvdA').value),k=parseFloat(document.getElementById('cvdType').value);
  const o=document.getElementById('cvdOut'); if([I,L,A].some(isNaN)){o.textContent='請填齊 I、L、A';return;}
  const e=k*L*I/(1000*A); o.innerHTML=`電壓降 e = <span class="cbig">${kR2(e)} V</span>`; }

function revealRationale(q){

function answer(pick){
  const s=session; if(s.answered) return; s.answered=true;
  const q=s.list[s.i], correct=(pick===q.ans);
  grade(q.id, correct);

  document.querySelectorAll(".opt").forEach(el=>{
    const i=+el.dataset.i; el.classList.add("dis"); el.onclick=null;
    if(i===q.ans) el.classList.add("correct"); else if(i===pick) el.classList.add("wrong");

// ─────────── 聽力模式（語音朗讀：只唸 題目→正解→詳解）───────────
let audio={on:false, i:0, list:[], rate:0.95, readExp:true, loop:false, title:'', gen:0};
function ttsClean(s){ return String(s)
  .replace(/√/g,'根號').replace(/Ω/g,'歐姆').replace(/μF/g,'微法').replace(/μ/g,'微')
  .replace(/℃/g,'度C').replace(/≥/g,'大於等於').replace(/≤/g,'小於等於').replace(/∞/g,'無限大')
  .replace(/²/g,'平方').replace(/³/g,'立方').replace(/[（）()]/g,' '); }
function startListen(list, title){
  if(!('speechSynthesis' in window)){ alert('此瀏覽器不支援語音朗讀，建議用 Chrome / Safari。'); return; }
  if(!list.length) return;
  stopSpeak(); stopLesson();
  audio={on:false, i:0, list:list.slice(), rate:audio.rate, readExp:audio.readExp, loop:audio.loop, title, gen:audio.gen};
  listenView();
}
function listenView(){
  const a=audio, q=a.list[a.i], n=a.list.length;
  app.innerHTML=`
  <div class="qtop"><span onclick="home()">‹ 首頁</span><span>${a.title} · ${a.i+1}/${n}</span><span></span></div>
  <div class="pbar"><i style="width:${Math.round((a.i+1)/n*100)}%"></i></div>
  <div class="card">
    <div class="meta">${q.hot?'🔥 ':''}${q.cat}　${q.exam} 第${q.num}題</div>
    <div id="seg-q" class="seg q" style="font-size:17px">${esc(q.q)}</div>
    <div style="margin:6px 0">${q.opts.map((o,i)=>`<div style="font-size:14px;margin:2px 0;color:${i===q.ans-1?'var(--ok)':'var(--dim)'}">${K[i]} ${esc(o)}</div>`).join("")}</div>
    <div id="seg-ans" class="seg" style="color:var(--ok);font-weight:700">正解：${K[q.ans-1]} ${esc(q.opts[q.ans-1])}</div>
    ${q.exp?`<div id="seg-exp" class="seg" style="font-size:14px;color:#cdd6ea;margin-top:4px">💡 ${esc(q.exp)}</div>`:''}
    ${q.mem?`<div id="seg-mem" class="seg mem" style="font-size:14px;margin-top:6px">💬 ${esc(q.mem)}</div>`:''}
    <div class="lbtn" style="background:${a.on?'var(--warn)':'var(--brand)'}" onclick="toggleListen()">${a.on?'⏸':'▶'}</div>
    <div class="center tag">${a.on?'朗讀中…（只唸題目、正解、詳解；鎖屏會中斷，建議保持螢幕開啟）':'按播放：自動連播「題目 → 正解 → 詳解」'}</div>
    <div class="ctrl">
      <span class="pill" onclick="listenStep(-1)">⏮ 上題</span>
      <span class="pill" onclick="listenStep(1)">下題 ⏭</span>
      <span class="pill ${a.readExp?'on':''}" onclick="audio.readExp=!audio.readExp;listenView()">唸詳解</span>
      <span class="pill ${a.loop?'on':''}" onclick="audio.loop=!audio.loop;listenView()">循環</span>
    </div>
    <div class="ctrl">語速
      <select onchange="audio.rate=+this.value">
        ${[0.7,0.85,0.95,1.1,1.3].map(r=>`<option value="${r}" ${r===a.rate?'selected':''}>${r}x</option>`).join("")}
      </select>
    </div>
  </div>
  <div class="tag center">鍵盤 <kbd>空白</kbd> 播放/暫停 · <kbd>←</kbd><kbd>→</kbd> 換題</div>`;
  hlSeg(null);
}
function hlSeg(id){ ['seg-q','seg-ans','seg-exp','seg-mem'].forEach(x=>{const el=document.getElementById(x); if(el) el.classList.toggle('cur', x===id);}); }
function segsFor(q){
  const s=[{t:`第 ${audio.i+1} 題。${ttsClean(q.q)}`, hi:'seg-q', gap:500}];
  s.push({t:`正確答案，選項${CN[q.ans-1]}，${ttsClean(q.opts[q.ans-1])}`, hi:'seg-ans', gap:400});
  if(audio.readExp && q.exp) s.push({t:`解說。${ttsClean(q.exp)}`, hi:'seg-exp', gap:450});
  if(audio.readExp && q.mem) s.push({t:`白話講，${ttsClean(q.mem)}`, hi:'seg-mem', gap:650});
  return s;
}
// gen 世代守衛：cancel() 會觸發舊 utterance 的 onend，用 gen 比對可讓過期回呼失效，避免兩條朗讀鏈同時前進造成「亂跳」
function speakChain(segs, gen, done){
  let k=0;
  (function go(){
    if(!audio.on || gen!==audio.gen) return;
    if(k>=segs.length){ done&&done(); return; }
    hlSeg(segs[k].hi);
    const u=new SpeechSynthesisUtterance(segs[k].t); u.lang='zh-TW'; u.rate=audio.rate;
    const gap=segs[k].gap||200;
    u.onend=()=>{ if(gen!==audio.gen) return; k++; setTimeout(go, gap); };
    u.onerror=()=>{ if(gen!==audio.gen) return; k++; setTimeout(go, gap); };
    try{ speechSynthesis.speak(u); }catch(e){ if(gen===audio.gen){ k++; setTimeout(go, gap); } }
  })();
}
function playFrom(){
  if(!audio.on) return;
  const gen=audio.gen;
  listenView();
  speakChain(segsFor(audio.list[audio.i]), gen, ()=>{
    if(!audio.on || gen!==audio.gen) return;
    if(audio.i+1>=audio.list.length){
      if(audio.loop){ audio.i=0; } else { audio.on=false; listenView(); return; }
    } else { audio.i++; }
    playFrom();
  });
}
function stopSpeak(){ audio.gen++; try{ speechSynthesis.cancel(); }catch(e){} }
function toggleListen(){
  if(audio.on){ audio.on=false; stopSpeak(); listenView(); }
  else { stopSpeak(); audio.on=true; playFrom(); }
}
function listenStep(d){
  const was=audio.on; stopSpeak(); audio.on=false;
  audio.i=Math.max(0, Math.min(audio.list.length-1, audio.i+d));
  if(was){ audio.on=true; playFrom(); } else listenView();
}
function stopListen(){ if(window.speechSynthesis){ audio.on=false; stopSpeak(); } }

function resetAll(){ if(confirm("確定要清除所有作答進度與錯題本？")){ ST={s:{},day:{}}; save(); home() } }

document.addEventListener("keydown",e=>{
  if(!session && !audio.list.length) return;
  if(session && session.mode==='explain'){
    if(e.key==='ArrowLeft'){explainNav(-1);e.preventDefault()} else if(e.key==='ArrowRight'){explainNav(1);e.preventDefault()}
    return;
  }
  if(session && (session.mode==='sr'||session.mode==='exam'||session.mode==='sim'||session.mode==='wrong')){
    if(!session.answered && /^[1-4]$/.test(e.key)){ answer(+e.key); e.preventDefault() }
    else if(session.answered && (e.key==='Enter'||e.key===' ')){ next(); e.preventDefault() }
  }
});
// 聽力鍵盤（listen 沒有 session）
document.addEventListener("keydown",e=>{
  if(!audio.list.length || session) return;
  if(e.key===' '){ toggleListen(); e.preventDefault() }
  else if(e.key==='ArrowLeft'){ listenStep(-1); e.preventDefault() }
  else if(e.key==='ArrowRight'){ listenStep(1); e.preventDefault() }
});
window.addEventListener("beforeunload", ()=>{stopListen();stopLesson();});

home();
</script>
